services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-discord-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SQLITE_PATH: /data/bot.db
    volumes:
      - bot-data:/data

volumes:
  bot-data:
    name: tgbotforourgroup-data
